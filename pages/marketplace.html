<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق المعدات | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <style>
        .marketplace-hero { background: var(--dark); color: white; padding: var(--s8) 0; border-radius: var(--radius-lg); margin-bottom: var(--s10); text-align: center; }
        .marketplace-hero h1 { font-size: 2.5rem; margin-bottom: var(--s4); }
        .marketplace-hero p { opacity: 0.8; margin-bottom: var(--s6); }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        
        <div class="main-content">
            <app-navbar></app-navbar>

            <main class="page-content">
                <div class="container">
                    <div class="marketplace-hero animate-on-scroll">
                        <h1>سوق شير جير المركزي</h1>
                        <p>أكبر تجمع لبيع وشراء المعدات الثقيلة وقطع الغيار الأصلية</p>
                        <div class="nav-search" style="max-width: 600px; margin: 0 auto; display: block;">
                            <input type="text" placeholder="ما الذي تبحث عن شرائه اليوم؟" style="width: 100%; padding: 15px 45px; border-radius: 99px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main);">
                            <span class="search-icon" style="right: 15px;">🔍</span>
                        </div>
                    </div>

                    <section style="margin-bottom: 80px;">
                        <div class="section-header animate-on-scroll">
                            <div class="section-title">
                                <h2>تسوق حسب الفئة</h2>
                                <p>معدات ثقيلة، متوسطة، وقطع غيار</p>
                            </div>
                        </div>
                        <div class="categories-grid">
                            <div class="category-card animate-on-scroll">
                                <span class="category-icon">🚜</span>
                                <span class="category-name">معدات مستعملة</span>
                            </div>
                            <div class="category-card animate-on-scroll">
                                <span class="category-icon">✨</span>
                                <span class="category-name">معدات جديدة</span>
                            </div>
                            <div class="category-card animate-on-scroll">
                                <span class="category-icon">⚙️</span>
                                <span class="category-name">قطع غيار</span>
                            </div>
                            <div class="category-card animate-on-scroll">
                                <span class="category-icon">🛢️</span>
                                <span class="category-name">زيوت وفلاتر</span>
                            </div>
                        </div>
                    </section>

                    <section>
                        <div class="section-header animate-on-scroll">
                            <div class="section-title">
                                <h2>أحدث العروض</h2>
                                <p>صفقات حصرية مختارة لك بعناية</p>
                            </div>
                            <button class="btn btn-outline" onclick="navigateTo('marketplace-search.html')">عرض الكل</button>
                        </div>

                        <div id="marketplace-grid" class="product-grid">
                            <!-- Skeleton Loaders -->
                            <div class="card skeleton" style="height: 300px;"></div>
                            <div class="card skeleton" style="height: 300px;"></div>
                            <div class="card skeleton" style="height: 300px;"></div>
                        </div>
                    </section>
                </div>
            </main>
            
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('marketplace-grid');
            try {
                const equipment = await API.getEquipment();
                grid.innerHTML = equipment.map(e => `
                    <div class="card product-card animate-on-scroll">
                        <div class="product-img">
                            <img src="${e.image}" alt="${e.name}">
                            <span class="badge badge-warning" style="position: absolute; top: 15px; right: 15px;">للبيع</span>
                        </div>
                        <div class="product-info">
                            <div class="product-price">${e.price.toLocaleString()} ريال</div>
                            <h3 class="card-title" style="font-size: var(--text-lg);">${e.name}</h3>
                            <p class="text-muted" style="font-size: var(--text-sm); margin-bottom: var(--s4);">بائع موثوق | 📍 ${e.location}</p>
                            <button class="btn btn-primary w-full" onclick="window.navigateTo('product-details.html')">عرض التفاصيل</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p class="text-muted">فشل تحميل البيانات</p>';
            }
        });
    </script>
</body>
</html>
