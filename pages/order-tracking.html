<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الطلب | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <div class="container" style="max-width: 900px;">
            <header class="section-header animate-on-scroll">
                <div class="section-title">
                    <nav style="margin-bottom: 10px; font-size: 0.8rem; color: var(--text-muted);">
                        <a href="orders.html">طلباتي</a> > #ORD-55902
                    </nav>
                    <h1>تتبع الطلب #ORD-55902</h1>
                </div>
            </header>

            <div class="card animate-on-scroll" style="margin-bottom: 30px; text-align: center; padding: 40px;">
                <div class="tracker-steps" style="display: flex; justify-content: space-between; position: relative; margin-bottom: 40px;">
                    <div style="position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: var(--border-color); z-index: 1;"></div>
                    <div class="step completed" style="position: relative; z-index: 2; background: var(--bg-card); padding: 0 10px;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--success); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">✓</div>
                        <span style="font-size: 0.8rem; font-weight: 700;">تم الطلب</span>
                    </div>
                    <div class="step active" style="position: relative; z-index: 2; background: var(--bg-card); padding: 0 10px;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">2</div>
                        <span style="font-size: 0.8rem; font-weight: 700;">قيد التجهيز</span>
                    </div>
                    <div class="step" style="position: relative; z-index: 2; background: var(--bg-card); padding: 0 10px;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">3</div>
                        <span style="font-size: 0.8rem; font-weight: 700;">في الطريق</span>
                    </div>
                    <div class="step" style="position: relative; z-index: 2; background: var(--bg-card); padding: 0 10px;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">4</div>
                        <span style="font-size: 0.8rem; font-weight: 700;">تم التسليم</span>
                    </div>
                </div>
                
                <div class="alert alert-info">
                    <strong>الحالة الحالية:</strong> يتم الآن فحص المعدة وتجهيزها للنقل من قبل البائع.
                </div>
            </div>

            <div class="map-container animate-on-scroll">
                <div class="map-placeholder">
                    <span>سيتم تفعيل التتبع المباشر فور خروج المعدة للشحن 🚛</span>
                </div>
            </div>
        </div>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script></body>
</html>
