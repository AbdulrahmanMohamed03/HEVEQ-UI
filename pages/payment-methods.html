<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

                        <div>
                            <strong>Mastercard **** 5555</strong>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">تنتهي في 06/27</p>

        </div>
                </div>
            </main>

        </div>
