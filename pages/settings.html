<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <div class="container" style="max-width: 800px;">
            <header class="section-header animate-on-scroll">
                <div class="section-title">
                    <h1>الإعدادات</h1>
                    <p style="color: var(--text-muted);">تخصيص تجربة استخدامك لمنصة شير جير</p>
                </div>
            </header>

            <div class="card animate-on-scroll" style="margin-bottom: 25px;">
                <h3 style="margin-bottom: 20px;">تنبيهات الإشعارات</h3>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                        <div>
                            <strong>إشعارات البريد الإلكتروني</strong>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">استلام تحديثات الحجوزات عبر البريد</p>
                        </div>
                        <input type="checkbox" checked>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
                        <div>
                            <strong>إشعارات الرسائل</strong>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">تنبيه عند استلام رسالة جديدة من مزود</p>
                        </div>
                        <input type="checkbox" checked>
                    </div>
                </div>
            </div>

            <div class="card animate-on-scroll">
                <h3 style="margin-bottom: 20px; color: var(--danger);">منطقة الخطر</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">حذف الحساب سيؤدي إلى مسح جميع بياناتك وحجوزاتك بشكل نهائي.</p>
                <button class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);">حذف الحساب نهائياً</button>
            </div>
        </div>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script></body>
</html>
