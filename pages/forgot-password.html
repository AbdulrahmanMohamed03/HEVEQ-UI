<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-main) 0%, rgba(244, 163, 0, 0.05) 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <div class="auth-wrapper">
        <div class="card auth-card animate-on-scroll">
            <h2 style="text-align: center;">استعادة كلمة المرور</h2>
            <p style="color: var(--text-muted); text-align: center; margin: 15px 0 30px;">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لاستعادة كلمة المرور</p>

            <form id="forgot-form">
                <div class="form-group" style="margin-bottom: 25px;">
                    <label class="form-label" style="display: block; margin-bottom: 8px; font-weight: 700;">البريد الإلكتروني</label>
                    <input type="email" class="form-input" style="width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: var(--radius);" placeholder="example@mail.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">إرسال الرابط</button>
            </form>

            <div style="text-align: center; margin-top: 25px;">
                <a href="login.html" style="color: var(--primary); font-weight: 700;">العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.showToast('تم إرسال الرابط بنجاح، تحقق من بريدك الإلكتروني');
        });
    </script></body>
</html>
