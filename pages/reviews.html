<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقييمات | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <div class="container" style="max-width: 800px;">
            <header class="section-header animate-on-scroll">
                <div class="section-title">
                    <h1>تقييماتي</h1>
                    <p style="color: var(--text-muted);">تقييماتك لمزودي الخدمة وآراء المزودين عنك</p>
                </div>
            </header>

            <div class="card animate-on-scroll" style="margin-bottom: 30px;">
                <div style="display: flex; gap: 40px; align-items: center;">
                    <div style="text-align: center;">
                        <h2 style="font-size: 3rem; color: var(--primary);">4.8</h2>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">تقييمك العام كعميل</p>
                    </div>
                    <div style="flex: 1;">
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
                                <span>5 نجوم</span>
                                <span>85%</span>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width: 85%;"></div></div>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
                                <span>4 نجوم</span>
                                <span>10%</span>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width: 10%;"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="reviews-list">
                <div class="card animate-on-scroll" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div class="avatar">🏗️</div>
                            <div>
                                <strong>المقاولون العرب</strong>
                                <p style="font-size: 0.75rem; color: var(--text-muted);">بناءً على حجز #BK-1001</p>
                            </div>
                        </div>
                        <div style="color: #FBBF24;">⭐⭐⭐⭐⭐</div>
                    </div>
                    <p style="font-size: 0.9rem; line-height: 1.6;">"عميل ممتاز ومحترف، موقع العمل كان جاهزاً والتعامل كان في غاية الرقي. ننصح بالتعامل معه."</p>
                </div>
            </div>
        </div>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script></body>
</html>
