<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الملف الشخصي | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
</head>
<body>

    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        
        <div class="main-content">
            <app-navbar></app-navbar>

            <main class="page-content">
                <div class="container" style="max-width: 800px;">
                    <header class="page-header animate-on-scroll">
                        <div class="section-title">
                            <h1>الملف الشخصي</h1>
                            <p>إدارة معلوماتك الشخصية وإعدادات الحساب</p>
                        </div>
                    </header>

                    <div class="card animate-on-scroll">
                        <div style="text-align: center; margin-bottom: var(--s8);">
                            <div class="avatar" style="width: 100px; height: 100px; font-size: 2.5rem; margin: 0 auto 20px;">AH</div>
                            <button class="btn btn-outline" style="font-size: var(--text-xs); padding: 6px 16px;">تغيير الصورة</button>
                        </div>

                        <form id="profile-form">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--s5); margin-bottom: var(--s5);">
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">الاسم الأول</label>
                                    <input type="text" class="form-input" value="أحمد">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">اسم العائلة</label>
                                    <input type="text" class="form-input" value="حسن">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">البريد الإلكتروني</label>
                                <input type="email" class="form-input" value="ahmed.hassan@example.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">رقم الهاتف</label>
                                <input type="tel" class="form-input" value="+20 123 456 7890" dir="ltr" style="text-align: right;">
                            </div>
                            <div class="form-group" style="margin-bottom: var(--s8);">
                                <label class="form-label">العنوان الافتراضي</label>
                                <input type="text" class="form-input" value="مدينة نصر، القاهرة، مصر">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-full" style="padding: var(--s4);">حفظ التغييرات</button>
                        </form>
                    </div>

                    <div class="card animate-on-scroll" style="margin-top: 30px;">
                        <h3 style="margin-bottom: 20px;">روابط سريعة</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <button class="btn btn-outline" style="justify-content: flex-start;" onclick="window.navigateTo('wallet.html')">💳 المحفظة</button>
                            <button class="btn btn-outline" style="justify-content: flex-start;" onclick="window.navigateTo('settings.html')">⚙️ الإعدادات</button>
                            <button class="btn btn-outline" style="justify-content: flex-start;" onclick="window.navigateTo('saved-addresses.html')">📍 العناوين</button>
                            <button class="btn btn-outline" style="justify-content: flex-start;" onclick="window.navigateTo('payment-methods.html')">💳 طرق الدفع</button>
                        </div>
                    </div>
                </div>
            </main>
            
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script>

    <script>
        document.getElementById('profile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.showToast('تم حفظ التغييرات بنجاح');
        });
    </script>
</body>
</html>
