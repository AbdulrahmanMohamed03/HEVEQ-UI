<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg-main) 0%, rgba(244, 163, 0, 0.05) 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 550px;
            padding: 40px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo { font-size: 2rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .auth-logo span { color: var(--text-main); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius);
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            font-family: inherit;
            transition: 0.3s;
        }
        .form-input:focus { border-color: var(--primary); outline: none; }
        .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .role-option {
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .role-option.active { border-color: var(--primary); background: rgba(244, 163, 0, 0.05); }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary); font-weight: 700; }
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <div class="auth-wrapper">
        <div class="card auth-card animate-on-scroll">
            <div class="auth-header">
                <div class="auth-logo"><span>شير</span>جير</div>
                <h2>انضم إلينا اليوم</h2>
                <p style="color: var(--text-muted);">اختر نوع الحساب وابدأ رحلتك</p>
            </div>

            <div class="role-selector">
                <div class="role-option active" onclick="selectRole(this, 'customer')">
                    <span style="font-size: 1.5rem; display: block;">👤</span>
                    <strong>عميل</strong>
                </div>
                <div class="role-option" onclick="selectRole(this, 'provider')">
                    <span style="font-size: 1.5rem; display: block;">🏗️</span>
                    <strong>مزود خدمة</strong>
                </div>
            </div>

            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">الاسم الأول</label>
                        <input type="text" class="form-input" placeholder="أحمد" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">اسم العائلة</label>
                        <input type="text" class="form-input" placeholder="حسن" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-input" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-input" placeholder="+20 123 456 7890" required>
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">إنشاء الحساب</button>
            </form>

            <div class="auth-footer">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </div>
        </div>
    </div>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script>
    <script>
        let selectedRole = 'customer';
        function selectRole(el, role) {
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;
        }

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            sessionStorage.setItem('pendingRole', selectedRole);
            window.showToast('تم إنشاء الحساب بنجاح، جاري التحقق...');
            setTimeout(() => window.navigateTo('otp-verification.html'), 1500);
        });
    </script></body>
</html>
