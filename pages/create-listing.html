<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة جديدة | شير جير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
</head>
<body>
    <div class="layout-wrapper">
        <app-sidebar></app-sidebar>
        <div class="main-content">
            <app-navbar></app-navbar>
            <main class="page-content">
                <div class="container">
                    <main class="container" style="max-width: 800px; padding: 40px 0;">
        <header class="section-header animate-on-scroll">
            <div class="section-title">
                <h1>إضافة خدمة / معدة جديدة</h1>
                <p style="color: var(--text-muted);">أدخل تفاصيل المعدة لتتمكن من تأجيرها أو بيعها</p>
            </div>
        </header>

        <form class="card animate-on-scroll" id="listing-form">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">الاسم أو العنوان</label>
                <input type="text" class="form-input" placeholder="مثال: حفار كاتر بيلر 320D" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label class="form-label">الفئة</label>
                    <select class="form-input">
                        <option>حفارات</option>
                        <option>أوناش</option>
                        <option>لوادر</option>
                        <option>قطع غيار</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">نوع العرض</label>
                    <select class="form-input">
                        <option>للإيجار بالساعة</option>
                        <option>للإيجار باليوم</option>
                        <option>للبيع</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">السعر (ريال)</label>
                <input type="number" class="form-input" placeholder="0" required>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">الوصف</label>
                <textarea class="form-input" style="height: 120px; resize: none;" placeholder="أضف تفاصيل المعدة وحالتها..." required></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 30px;">
                <label class="form-label">صور المعدة</label>
                <div style="border: 2px dashed var(--border-color); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border-color)'">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📸</div>
                    <p style="color: var(--text-muted);">اسحب وأفلت الصور هنا أو اضغط للتحميل</p>
                </div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <button type="button" class="btn btn-outline" onclick="history.back()">إلغاء</button>
                <button type="submit" class="btn btn-primary">نشر العرض</button>
            </div>
        </form>
    </main>
                </div>
            </main>
            <app-footer></app-footer>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/components/app-navbar.js"></script>
    <script src="../js/components/app-sidebar.js"></script>
    <script src="../js/components/app-footer.js"></script>
    <script>
        document.getElementById('listing-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.showToast('تم نشر العرض بنجاح، جاري المراجعة من الإدارة');
            setTimeout(() => window.location.href = 'provider-dashboard.html', 1500);
        });
    </script></body>
</html>
